# =============================================================================
# VULNERABILITY SCAN + REMEDIATION PIPELINE
# =============================================================================
# Step 1: Vulnerability Scanner (original agent) - Shows vuln annotations
# Step 2: Vulnerability Remediator (new agent) - Pushes fix branch, shows PR link
#
# No additional secrets needed - uses codebase connector for git operations
# =============================================================================

pipeline:
  identifier: vuln_scan_remediate
  name: Vulnerability Scan and Remediate
  projectIdentifier: Bin_Claude
  orgIdentifier: default
  tags:
    purpose: security-automation
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: Gargithakur01/vuln-test-repo
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        identifier: security
        type: CI
        name: Security Scan & Fix
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              # =========================================
              # STEP 1: Vulnerability Scanner (Original)
              # =========================================
              # Uses: risk_analyzer agent (unchanged)
              # Annotations: Vulnerability cards (CRITICAL, HIGH, etc.)
              - step:
                  identifier: Vulnerability_Scanner
                  type: Agent
                  name: Vulnerability Scanner
                  spec:
                    agentName: risk_analyzer
                    agentSettings: ""
                    llmConnector: test
                    mcpConnectors: []
              
              # =========================================
              # STEP 2: Vulnerability Remediator (New)
              # =========================================
              # Uses: vuln_remediator agent (new)
              # Annotations: PR link, packages fixed, major bump warnings
              # Git push uses codebase connector credentials automatically
              - step:
                  identifier: Vulnerability_Remediator
                  type: Agent
                  name: Vulnerability Remediator
                  spec:
                    agentName: vuln_remediator
                    agentSettings: ""
                    llmConnector: test
                    mcpConnectors: []
